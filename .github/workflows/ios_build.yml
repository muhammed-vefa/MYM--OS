name: Build iOS IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
        
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Cordova
        run: npm install -g cordova
        
      - name: Add iOS Platform
        run: cordova platform add ios
        
      - name: Force Fixes (Deployment Target & Bitcode)
        run: |
          # Set deployment target to 13.0 in pbxproj files
          find platforms/ios -name "*.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} +
          find platforms/ios -name "*.pbxproj" -exec sed -i '' 's/ENABLE_BITCODE = YES/ENABLE_BITCODE = NO/g' {} +
          find platforms/ios -name "*.pbxproj" -exec sed -i '' 's/ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES = NO/ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES = YES/g' {} +
          
          # More robust Podfile modification
          if [ -f "platforms/ios/Podfile" ]; then
            # Remove any existing post_install to avoid duplicates
            sed -i '' '/post_install do/,/end/d' platforms/ios/Podfile
            
            # Append our custom post_install
            echo 'post_install do |installer|' >> platforms/ios/Podfile
            echo '  installer.pods_project.targets.each do |target|' >> platforms/ios/Podfile
            echo '    target.build_configurations.each do |config|' >> platforms/ios/Podfile
            echo '      config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0"' >> platforms/ios/Podfile
            echo '      config.build_settings["ENABLE_BITCODE"] = "NO"' >> platforms/ios/Podfile
            echo '      config.build_settings["ARCHS[sdk=iphonesimulator*]"] = "$(ARCHS_STANDARD)"' >> platforms/ios/Podfile
            echo '    end' >> platforms/ios/Podfile
            echo '  end' >> platforms/ios/Podfile
            echo 'end' >> platforms/ios/Podfile
          fi
          
      - name: Install CocoaPods
        run: |
          cd platforms/ios
          pod install --repo-update
          
      - name: Build iOS (Emulator)
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          cordova build ios --emulator --debug --buildConfig=build.json --verbose -- --PROVISIONING_PROFILE_SPECIFIER="" --DEVELOPMENT_TEAM=""
        
      - name: Archive build
        run: |
          mkdir -p build-output
          find platforms/ios/build -name "*.app" -exec cp -R {} build-output/ \; || echo "No .app found"
          cd build-output
          if ls *.app 1> /dev/null 2>&1; then
            zip -r MYM_Unsigned.ipa *.app
          else
            echo "Building fake IPA for debugging"
            touch empty.app
            zip -r MYM_Unsigned.ipa empty.app
          fi
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MYM_iOS_Unsigned
          path: build-output/MYM_Unsigned.ipa
