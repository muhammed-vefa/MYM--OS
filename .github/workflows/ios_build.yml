name: Build iOS IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.0.1.app
          
      - name: Install Cordova
        run: npm install -g cordova
        
      - name: Add iOS Platform
        run: cordova platform add ios
        
      - name: Force Deployment Target
        run: |
          find platforms/ios -name "*.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 11.0/IPHONEOS_DEPLOYMENT_TARGET = 12.0/g' {} +
          find platforms/ios -name "*.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10.0/IPHONEOS_DEPLOYMENT_TARGET = 12.0/g' {} +
          find platforms/ios -name "*.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 9.0/IPHONEOS_DEPLOYMENT_TARGET = 12.0/g' {} +
          
      - name: Build iOS
        run: cordova build ios --no-sign
        
      - name: Archive build
        run: |
          mkdir -p build-output
          find platforms/ios/build -name "*.app" -exec cp -R {} build-output/ \; || echo "No .app found"
          cd build-output
          if ls *.app 1> /dev/null 2>&1; then
            zip -r MYM_Unsigned.ipa *.app
          else
            echo "Building fake IPA for debugging"
            touch empty.app
            zip -r MYM_Unsigned.ipa empty.app
          fi
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MYM_iOS_Unsigned
          path: build-output/MYM_Unsigned.ipa
